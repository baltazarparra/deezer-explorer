<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Search for artists and explore their discographies using the Deezer API.">
  <meta name="theme-color" content="#2563eb">
  <meta property="og:title" content="Deezer Explorer">
  <meta property="og:description" content="Search for artists and explore their discographies using the Deezer API.">
  <title>Deezer Explorer</title>
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>

  <header>
    <h1>Deezer Explorer</h1>
  </header>

  <main id="main-content">
    <section id="search-section" aria-label="Artist search">
      <!-- Search form and results rendered by search-view.js -->
    </section>

    <section id="grid-section" class="hidden" aria-label="Album grid">
      <!-- Album grid will be rendered in Phase 2 -->
    </section>

    <section id="detail-section" class="hidden" aria-label="Album detail">
      <!-- Album detail will be rendered in Phase 3 -->
    </section>

    <div id="status-region" aria-live="polite" aria-atomic="true" class="visually-hidden"></div>
  </main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
